services:
  db:
    image: mariadb:11
    container_name: zitatdatenbank-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootchangeme}
      MYSQL_DATABASE:      ${DB_NAME:-zitatdatenbank}
      MYSQL_USER:          ${DB_USER:-zitate}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-zitate}
    volumes:
      - ./mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: zitatdatenbank
    ports:
      - "${WEB_PORT:-5000}:5000"
    volumes:
      - ./backups:/backups
      - ./data:/data
    environment:
      - FLASK_APP=app.py
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-zitatdatenbank}
      - DB_USER=${DB_USER:-zitate}
      - DB_PASSWORD=${DB_PASSWORD:-zitate}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
